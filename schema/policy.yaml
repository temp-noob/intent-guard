version: "1.0"
name: "frontend-dev-sandbox"

static_rules:
  forbidden_tools:
    - delete_database
    - purge_all
  protected_paths:
    - /etc/*
    - .env
    - src/auth/*
  max_tokens_per_call: 4000
  injection_patterns:
    - "ignore previous instructions"
    - "ignore all prior"
    - "disregard.*instructions"
    - "you are now"
    - "new instructions:"
    - "system prompt:"
    - "\\bact as\\b"
    - "pretend you are"
    - "override.*policy"
    - "bypass.*security"

semantic_rules:
  provider: ollama
  mode: enforce
  guardrail_model: llama-guard-3-8b
  critical_intent_threshold: 0.85
  retry_attempts: 2
  retry_base_delay_seconds: 0.25
  retry_max_delay_seconds: 2.0
  retry_jitter_ratio: 0.2
  circuit_breaker_failures: 3
  circuit_breaker_reset_seconds: 30
  provider_fail_mode:
    default: advisory
    by_tool:
      delete_database: enforce
      purge_all: enforce
  constraints:
    - intent: modify_source_code
      allowed_scope: Actions must only affect UI components or styles.
      forbidden_scope: Should not modify database schemas or auth logic.
    - intent: filesystem_access
      allowed_scope: Read-only access to documentation and assets.
